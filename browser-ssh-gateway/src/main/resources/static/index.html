<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browser SSH</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/vendor/xterm/xterm.css">
    <link rel="stylesheet" href="/css/terminal.css">
    <script src="/vendor/xterm/xterm.js" defer></script>
    <script src="/vendor/xterm/addon-fit.js" defer></script>
    <script src="/js/terminal.js" defer></script>
</head>
<body class="ssh-page">
<main class="ssh-shell">
    <section class="ssh-section">
        <div class="terminal-controls ssh-terminal-controls">
            <strong class="ssh-terminal-title">
            <img src="/favicon.svg" width="28" height="28" alt="">
                <span id="ssh-target-title">Browser SSH</span>
            </strong>
            <div class="ssh-terminal-buttons">
                <button id="ssh-upload" class="button small" type="button">Upload</button>
                <button id="ssh-download" class="button small" type="button">Download</button>
                <input id="ssh-upload-input" class="sr-only" type="file" autocomplete="off">
                <button class="button primary small" type="button" data-ssh-connect>Connect</button>
                <button id="ssh-disconnect" class="button small" type="button" disabled>Disconnect</button>
                <button id="ssh-duplicate" class="button small" type="button">Duplicate</button>
            </div>
        </div>
        <div class="ssh-terminal-frame">
            <div class="ssh-terminal-pane">
                <button class="ssh-pane-close" type="button" aria-label="Close terminal pane" disabled>x</button>
                <div id="ssh-terminal"
                     class="ssh-terminal"
                     data-ready="true"
                     data-auto-connect="true"
                     data-ssh-user="remote"
                     data-max-transfer-bytes="104857600"></div>
                <div id="ssh-overlay" class="ssh-overlay">
                    <div class="ssh-overlay-content">
                        <strong data-ssh-target-name>SSH terminal</strong>
                        <button class="button primary"
                                type="button"
                                data-ssh-connect
                                data-pane-connect>
                            Connect
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
