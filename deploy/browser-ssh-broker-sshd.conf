Port 10022
ListenAddress 127.0.0.1
AddressFamily inet
Protocol 2

HostKey /etc/browser-ssh-broker/ssh_host_ed25519_key
PidFile /run/browser-ssh-broker/sshd.pid
AuthorizedKeysFile /etc/browser-ssh-broker/authorized_keys

PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey
UsePAM no
StrictModes yes
AllowUsers browser-ssh-broker

ForceCommand /usr/local/libexec/browser-ssh-broker
PermitTTY yes
AllowAgentForwarding no
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no
GatewayPorts no
PermitUserEnvironment no
PermitUserRC no
Compression no
ClientAliveInterval 30
ClientAliveCountMax 2
MaxAuthTries 3
MaxSessions 4
MaxStartups 4:30:8
LoginGraceTime 20
LogLevel VERBOSE
